<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoSQL DB Explorer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            display: flex;
            height: 100vh;
        }

        aside {
            width: 270px;
            min-width: 270px;
            height: 100vh;
            background: #1a1d27;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-right: 1px solid #2a2d3a;
        }

        aside h2 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c7293;
            margin-bottom: 4px;
        }

        #collection-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            overflow-y: auto;
        }

        .col-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #22253a;
            transition: background 0.2s;
        }

        .col-item:hover, .col-item.active {
            background: #3a3f6b;
            color: #fff;
        }

        .new-collection {
            display: flex;
            gap: 6px;
            padding-top: 12px;
            border-top: 1px solid #2a2d3a;
            flex-shrink: 0;
        }

        .new-collection label { display: none; }

        .new-collection input {
            flex: 1;
            padding: 7px 10px;
            border-radius: 6px;
            border: 1px solid #2a2d3a;
            background: #22253a;
            color: #e0e0e0;
            font-size: 13px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
            overflow: hidden;
        }

        h1 { font-size: 18px; color: #a0a8d0; }

        .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #22253a;
            color: #6c7293;
        }

        .panels {
            display: flex;
            gap: 12px;
            height: 260px;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            padding: 12px;
        }

        .panel-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c7293;
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2a2d3a;
            background: #0f1117;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: none;
        }

        .panel-footer {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            padding: 7px 16px;
            border-radius: 6px;
            border: none;
            background: #3a3f6b;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        button:hover { background: #4a50a0; }
        button.danger { background: #6b3a3a; }
        button.danger:hover { background: #a04a4a; }
        button.sm { padding: 5px 12px; font-size: 12px; }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .results-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c7293;
        }

        #results {
            flex: 1;
            overflow-y: auto;
            background: #1a1d27;
            border-radius: 8px;
            border: 1px solid #2a2d3a;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<aside>
    <h2>Коллекции</h2>
    <div id="collection-list"></div>
    <div style="display:flex; flex-direction:column; gap:6px; flex-shrink:0;">
        <button onclick="getDocs()" style="width:100%">Показать коллекцию</button>
        <button class="danger" onclick="dropCollection()" style="width:100%">Удалить коллекцию</button>
    </div>
    <div class="new-collection">
        <label for="new-col-input">Новая коллекция</label>
        <input id="new-col-input" placeholder="Название..." aria-label="Название новой коллекции" />
        <button onclick="createCollection()">+</button>
    </div>
</aside>

<main>
    <div class="topbar">
        <h1>NoSQL DB Explorer <span class="tag" id="active-col">не выбрана</span></h1>
    </div>

    <div class="panels">
        <div class="panel">
            <div class="panel-title">➕ Добавить документ</div>
            <label for="add-area" style="display:none">Добавить документ JSON</label>
            <textarea id="add-area" placeholder='{"field": "value"}'></textarea>
            <div class="panel-footer">
                <button onclick="addDoc()">Добавить</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">🔍 Запрос</div>
            <label for="query-area" style="display:none">JSON запрос</label>
            <textarea id="query-area" placeholder='{"query": {"field": {"contains": "value"}}, "limit": 10}'></textarea>
            <div class="panel-footer">
                <button onclick="runQuery()">Выполнить запрос</button>
            </div>
        </div>
    </div>

    <div class="results-header">
        <span class="results-label">Результаты</span>
    </div>

    <div id="results">Выберите коллекцию слева...</div>
</main>

<script>
    let activeCollection = null;

    async function api(method, url, body = null) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(url, opts);
        return res.json();
    }

    function show(data) {
        document.getElementById('results').textContent = JSON.stringify(data, null, 2);
    }

    async function loadCollections() {
        const data = await api('GET', '/db/collections');
        const list = document.getElementById('collection-list');
        list.innerHTML = '';
        for (const name of data.collections || []) {
            const el = document.createElement('div');
            el.className = 'col-item';
            el.textContent = name;
            el.onclick = () => selectCollection(name, el);
            list.appendChild(el);
        }
    }

    function selectCollection(name, el) {
        activeCollection = name;
        document.querySelectorAll('.col-item').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('active-col').textContent = name;
        void getDocs();
    }

    async function createCollection() {
        const input = document.getElementById('new-col-input');
        const name = input.value.trim();
        if (!name) return;
        await api('POST', '/db/collections', { name });
        input.value = '';
        await loadCollections();
    }

    async function dropCollection() {
        if (!activeCollection) return;
        if (!confirm(`Удалить коллекцию "${activeCollection}"?`)) return;
        await api('DELETE', `/db/collections/${activeCollection}`);
        activeCollection = null;
        document.getElementById('active-col').textContent = 'не выбрана';
        document.getElementById('results').textContent = 'Коллекция удалена.';
        await loadCollections();
    }

    async function getDocs() {
        if (!activeCollection) return;
        const data = await api('GET', `/db/${activeCollection}/documents`);
        show(data);
    }

    async function addDoc() {
        if (!activeCollection) { show({ error: "Выберите коллекцию" }); return; }
        const raw = document.getElementById('add-area').value.trim();
        if (!raw) return;
        const body = JSON.parse(raw);
        const data = await api('POST', `/db/${activeCollection}/documents`, body);
        show(data);
        document.getElementById('add-area').value = '';
        await getDocs();
    }

    async function runQuery() {
        if (!activeCollection) { show({ error: "Выберите коллекцию" }); return; }
        const raw = document.getElementById('query-area').value.trim();
        if (!raw) return;
        const body = JSON.parse(raw);
        const data = await api('POST', `/db/${activeCollection}/query`, body);
        show(data);
    }

    void loadCollections();
</script>

</body>
</html>
